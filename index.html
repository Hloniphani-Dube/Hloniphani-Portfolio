<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hloniphani Dube — Software Developer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== NAVIGATION ===================== -->
  <nav id="navbar">
    <div class="nav-container">
      <a href="#hero" class="nav-logo"></a>
      <ul class="nav-links">
        <li><a href="#hero" class="nav-link">Home</a></li>
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#skills" class="nav-link">Skills</a></li>
        <li><a href="#education" class="nav-link">Education</a></li>
        <li><a href="#projects" class="nav-link">Projects</a></li>
        <li><a href="#experience" class="nav-link">Experience</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- ======================= HERO ======================== -->
  <section id="hero">
    <div class="hero-content">
      <div class="profile-section">
        <img id="profile-img" src="" alt="Profile" class="profile-image" />
      </div>
      <h1 id="hero-name"></h1>
      <p class="tagline" id="hero-tagline"></p>
      <p class="hero-description" id="hero-description"></p>
      <div class="hero-buttons" id="hero-buttons"></div>
    </div>
  </section>

  <!-- ======================= ABOUT ======================= -->
  <section id="about">
    <div class="container">
      <h2 class="section-title">About Me</h2>
      <div class="about-content" id="about-content"></div>
    </div>
  </section>

  <!-- ====================== SKILLS ======================= -->
  <section id="skills">
    <div class="container">
      <h2 class="section-title">Skills</h2>
      <div class="skills-grid" id="skills-grid"></div>
    </div>
  </section>

  <!-- ==================== EDUCATION ====================== -->
  <section id="education">
    <div class="container">
      <h2 class="section-title">Education & Certificates</h2>
      <div class="education-grid" id="education-grid"></div>
    </div>
  </section>

  <!-- ===================== PROJECTS ====================== -->
  <section id="projects">
    <div class="container">
      <h2 class="section-title">Projects</h2>
      <div class="projects-list" id="projects-list"></div>
    </div>
  </section>

  <!-- ==================== EXPERIENCE ===================== -->
  <section id="experience">
    <div class="container">
      <h2 class="section-title">Experience</h2>
      <div class="experience-list" id="experience-list"></div>
    </div>
  </section>

  <!-- ===================== CONTACT ======================= -->
  <section id="contact">
    <div class="container">
      <h2 class="section-title">Contact</h2>
      <p class="contact-intro">Feel free to reach out for collaboration, opportunities, or just to connect.</p>
      <ul class="contact-details" id="contact-details"></ul>
    </div>
  </section>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
